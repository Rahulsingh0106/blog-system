version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - REDIS_HOST=redis
    depends_on:
      - redis
      - mongo

  redis:
    image: redis:latest

  mongo:
    image: mongo:latest

  worker:
    build: ./backend
    command: node worker.js
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
      - mongo

